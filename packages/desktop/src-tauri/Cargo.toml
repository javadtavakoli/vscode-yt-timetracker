[package]
name = "ylate-desktop"
version = "0.1.0"
edition = "2021"
authors = ["Javad Tavakoli <javadtavakoli95@gmail.com>"]
license = "MIT"
description = "Ylate desktop — YouTrack time tracker for Windows, macOS, and Linux."

[lib]
name = "ylate_desktop_lib"
path = "src/lib.rs"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-store = "2"
tauri-plugin-single-instance = "2"
tauri-plugin-autostart = "2"
# Runs HTTP requests through Rust (reqwest) instead of the webview, so
# YouTrack API calls don't get blocked by WebKit2GTK's CORS policy on Linux.
tauri-plugin-http = "2"
# Opens URLs (and files) in the user's default browser / handler. Used by
# the renderer to deep-link issue IDs back to YouTrack.
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# OS-native keychain for the YouTrack token: macOS Keychain, Windows
# Credential Manager, Linux libsecret (needs libsecret-1-dev at build time).
keyring = "3"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
