packages:
  - 'packages/*'

allowBuilds:
  esbuild: set this to true or false

# Only the packages listed here may run their postinstall scripts. esbuild
# needs to download its native binary on install; everything else (vsce-sign,
# keytar) is skipped silently — keytar's keychain bindings will be opt-in when
# we wire up `vsce login`, vsce-sign is only used for signed extensions which
# we don't do yet.
onlyBuiltDependencies:
  - esbuild
