packages:
  - 'packages/*'

# `onlyBuiltDependencies` is the allowlist of packages whose postinstall
# scripts MAY run. esbuild downloads its native binary in postinstall, so it
# must be here or our builds break.
onlyBuiltDependencies:
  - esbuild

# `ignoredBuiltDependencies` is the explicit "we know about these, please
# don't warn / don't escalate to a non-zero exit code" list. pnpm 11 fails
# CI installs otherwise — locally `.npmrc`'s `verify-deps-before-run=false`
# papered over this for `pnpm run`, but `pnpm install` needs the explicit
# acknowledgement.
#
# - @vscode/vsce-sign: only used when signing extensions (we don't yet).
# - keytar:            native keychain bindings used by `vsce login`. The
#                      desktop app uses the `keyring` Rust crate instead —
#                      this JS keytar comes in transitively via vsce and
#                      we don't need it.
ignoredBuiltDependencies:
  - '@vscode/vsce-sign'
  - keytar

allowBuilds:
  '@vscode/vsce-sign': set this to true or false
  esbuild: set this to true or false
  keytar: set this to true or false
  sharp: set this to true or false

minimumReleaseAgeExclude:
  - trackpilot@0.3.0
  - trackpilot@0.4.0
  - trackpilot@0.5.0
