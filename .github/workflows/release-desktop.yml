name: release-desktop

# Builds Ylate Desktop on macOS, Windows, and Linux when a `desktop-v*` tag
# is pushed (e.g. `desktop-v0.1.0`), and attaches the resulting installers to
# a draft GitHub Release. Review the draft and publish manually.
#
# To cut a release:
#   1. Bump version in packages/desktop/{package.json, src-tauri/Cargo.toml,
#      src-tauri/tauri.conf.json}.
#   2. Commit, then: git tag desktop-v0.1.0 && git push --tags
#   3. Wait ~10–20 min for all three runners to finish.
#   4. Review and publish the draft Release on GitHub.

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch: {}

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    # Repeated here in addition to the workflow-level `permissions:` block.
    # Both are needed: the top-level grants permissions to the workflow, the
    # job-level overrides any defaults the repo's Actions settings impose.
    # Without this *and* the repo setting "Read and write permissions"
    # toggled on, release creation 403s with "Resource not accessible by
    # integration".
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macOS (universal)
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            label: Linux x86_64
            args: ''
          - platform: windows-latest
            label: Windows x86_64
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file pkg-config \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev libglib2.0-dev \
            libsecret-1-dev libdbus-1-dev

      - name: Set up pnpm
        # Version comes from `packageManager` in the root package.json —
        # don't specify it here, pnpm/action-setup@v4 errors on duplicates.
        uses: pnpm/action-setup@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install JS dependencies
        # bash on all three runners so the `[]` arg quoting below is uniform
        # (Windows would otherwise default to pwsh).
        shell: bash
        # --ignore-scripts because pnpm 11 escalates IGNORED_BUILDS to a hard
        # error in CI (the local TTY path just prints a warning). None of the
        # postinstall scripts in our tree are required:
        #   * esbuild ships its binary in @esbuild/<platform> subpackages
        #   * @vscode/vsce-sign is only used for signed extensions
        #   * keytar comes transitively via vsce; desktop uses the Rust
        #     `keyring` crate for keychain access
        #
        # `--config.minimumReleaseAgeExclude[]=trackpilot` exempts our own
        # first-party package from the runner's minimum-release-age supply-chain
        # gate, so a freshly-published trackpilot version doesn't block the
        # release build. The gate still applies to every third-party dep. The
        # `pnpm-workspace.yaml` exclude isn't honored when the age threshold
        # comes from the runner's global config, so it's set inline (CLI =
        # highest precedence).
        run: pnpm install --frozen-lockfile --ignore-scripts "--config.minimumReleaseAgeExclude[]=trackpilot"

      - name: Sync version from tag
        # `desktop-v0.1.1` → write 0.1.1 into the three places that drive the
        # bundled installer's version string. Without this step, tagging
        # desktop-v0.1.1 still produces 0.1.0 installers because the source
        # files weren't touched.
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          echo "Setting desktop version to $VERSION"
          node -e "
            const fs = require('fs');
            const v = process.argv[1];
            // tauri.conf.json
            const confPath = 'packages/desktop/src-tauri/tauri.conf.json';
            const conf = JSON.parse(fs.readFileSync(confPath, 'utf8'));
            conf.version = v;
            fs.writeFileSync(confPath, JSON.stringify(conf, null, 2) + '\n');
            // package.json
            const pkgPath = 'packages/desktop/package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.version = v;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
            // Cargo.toml — only the first [package].version line
            const cargoPath = 'packages/desktop/src-tauri/Cargo.toml';
            const cargo = fs.readFileSync(cargoPath, 'utf8');
            fs.writeFileSync(cargoPath, cargo.replace(/^version\s*=\s*\".*\"/m, 'version = \"' + v + '\"'));
            console.log('Wrote ' + v + ' into all three desktop version fields.');
          " "$VERSION"
          echo "--- After update:"
          grep '"version"' packages/desktop/package.json | head -1
          grep '"version"' packages/desktop/src-tauri/tauri.conf.json | head -1
          grep '^version' packages/desktop/src-tauri/Cargo.toml | head -1

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Rust targets (universal binary)
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'packages/desktop/src-tauri -> target'
          shared-key: ${{ matrix.platform }}

      - name: Generate per-OS Tauri icon set
        run: pnpm --filter @ylate/desktop icons

      - name: Build & upload (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          # Prefer the repo-level PAT (fine-grained, scoped to actions +
          # contents + releases). The default GITHUB_TOKEN is gated by the
          # "Workflow permissions" repo setting which can 403 release
          # creation even with `permissions: contents: write` in YAML.
          # Falls back to GITHUB_TOKEN if PAT is absent so contributors
          # forking the repo aren't blocked.
          GITHUB_TOKEN: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/desktop
          # Only create / update the GH Release when triggered by a tag push.
          # workflow_dispatch runs just exercise the build.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Ylate Desktop {0}', github.ref_name) || '' }}
          releaseBody: |
            Ylate Desktop — YouTrack time tracker for Windows, macOS, and Linux.

            **First-run note:** v0.1 builds are **unsigned**, so your OS may show a "developer cannot be verified" warning the first time:
            - macOS: right-click the .dmg → Open, confirm.
            - Windows: SmartScreen → "More info" → "Run anyway".
            - Linux: AppImage just `chmod +x` and run.

            See [the README](https://github.com/javadtavakoli/vscode-yt-timetracker/blob/main/packages/desktop/README.md) for setup and known limitations.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
